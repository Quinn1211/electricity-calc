<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>分房電費計算機</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --primary: #007aff;
    --primary-light: #e8f0ff;
    --danger: #ff3b30;
    --success: #34c759;
    --text: #1c1c1e;
    --text2: #636366;
    --text3: #aeaeb2;
    --border: #e5e5ea;
    --tab-bar: #ffffff;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(60px + var(--safe-bottom));
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 12px;
    padding-top: calc(16px + env(safe-area-inset-top, 0px));
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header h1 {
    font-size: 17px;
    font-weight: 600;
    text-align: center;
  }

  /* Tab Bar */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--tab-bar);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }
  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px 0;
    border: none;
    background: none;
    color: var(--text3);
    font-size: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.15s;
  }
  .tab-btn.active { color: var(--primary); }
  .tab-btn svg { width: 24px; height: 24px; }

  /* Pages */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    padding: 12px 16px 8px;
  }

  /* Form rows */
  .form-row {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    gap: 12px;
  }
  .form-row:first-of-type { border-top: none; }
  .form-label {
    font-size: 15px;
    flex: 1;
    white-space: nowrap;
  }
  .form-label small {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-top: 1px;
  }
  input[type="number"], input[type="text"] {
    border: none;
    outline: none;
    font-size: 15px;
    font-family: inherit;
    text-align: right;
    color: var(--primary);
    background: transparent;
    width: 120px;
    -webkit-appearance: none;
  }
  input::placeholder { color: var(--text3); }
  input:focus { color: var(--text); }

  /* Row double (two inputs side by side) */
  .form-row-double {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    gap: 8px;
  }
  .form-row-double .form-label { flex: 1.2; font-size: 14px; }
  .input-pair {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
  }
  .input-pair input { width: 60px; }
  .input-pair .unit { font-size: 13px; color: var(--text2); white-space: nowrap; }

  /* Calculate button */
  .btn-calc {
    display: block;
    width: 100%;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 16px;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .btn-calc:active { opacity: 0.8; }

  /* Result */
  .result-section { display: none; }
  .result-section.show { display: block; }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .result-row:first-child { border-top: none; }
  .result-label { font-size: 15px; }
  .result-label small { display: block; font-size: 12px; color: var(--text2); }
  .result-value { font-size: 17px; font-weight: 600; }
  .result-value.total { font-size: 22px; color: var(--primary); }
  .result-value.f4 { color: #ff9500; }
  .result-value.f5 { color: var(--success); }

  /* Save button */
  .btn-save {
    display: block;
    width: 100%;
    background: var(--success);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 16px;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .btn-save:active { opacity: 0.8; }

  /* History list */
  .history-item {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }
  .history-item:first-child { border-top: none; }
  .history-item:active { background: var(--bg); }
  .history-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .history-period {
    font-size: 16px;
    font-weight: 600;
  }
  .history-total {
    font-size: 16px;
    font-weight: 600;
    color: var(--primary);
  }
  .history-fees {
    display: flex;
    gap: 16px;
  }
  .history-fee {
    font-size: 13px;
    color: var(--text2);
  }
  .history-fee span {
    font-weight: 500;
    color: var(--text);
  }

  /* Expand detail */
  .history-detail {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .history-detail.show { display: block; }
  .detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 4px;
  }
  .detail-row span { color: var(--text); }

  .btn-delete {
    margin-top: 10px;
    background: none;
    border: 1px solid var(--danger);
    border-radius: 8px;
    color: var(--danger);
    font-size: 13px;
    font-family: inherit;
    padding: 6px 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(70px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Info badge */
  .info-row {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text3);
    background: var(--primary-light);
    border-top: 1px solid var(--border);
  }

  /* Select dropdowns */
  .select-pair {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .select-pair select {
    border: none;
    outline: none;
    font-size: 15px;
    font-family: inherit;
    color: var(--primary);
    background: transparent;
    -webkit-appearance: none;
    text-align: right;
    cursor: pointer;
    padding: 2px 0;
  }
  .select-sep {
    font-size: 15px;
    color: var(--text2);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 16px;
  }

  /* Date range rows */
  .form-row-date {
    display: flex;
    align-items: center;
    padding: 11px 16px;
    border-top: 1px solid var(--border);
    gap: 8px;
  }
  .form-row-date .form-label { font-size: 15px; white-space: nowrap; flex: 0 0 auto; width: 68px; }
  .date-range {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    justify-content: flex-end;
  }
  .date-input {
    width: 74px !important;
    text-align: center !important;
    color: var(--primary) !important;
    font-size: 14px !important;
    border: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1px;
  }
  .date-sep { font-size: 13px; color: var(--text2); }
</style>
</head>
<body>

<div class="header">
  <h1>分房電費計算機</h1>
</div>

<!-- Page: 計算 -->
<div class="page active" id="page-calc">

  <!-- 帳單資訊 -->
  <div class="card">
    <div class="card-title">台電帳單資訊</div>
    <div class="form-row">
      <div class="form-label">帳單期別</div>
      <div class="select-pair">
        <select id="periodYear"></select>
        <span class="select-sep">年</span>
        <select id="periodMonth">
          <option value="01">01</option><option value="02">02</option>
          <option value="03">03</option><option value="04">04</option>
          <option value="05">05</option><option value="06">06</option>
          <option value="07">07</option><option value="08">08</option>
          <option value="09">09</option><option value="10">10</option>
          <option value="11">11</option><option value="12">12</option>
        </select>
        <span class="select-sep">月</span>
      </div>
    </div>
    <div class="form-row-date">
      <div class="form-label">計費日期</div>
      <div class="date-range">
        <input type="text" id="billDateFrom" placeholder="115/1/7" inputmode="text" class="date-input">
        <span class="date-sep">至</span>
        <input type="text" id="billDateTo" placeholder="115/3/5" inputmode="text" class="date-input">
      </div>
    </div>
    <div class="form-row-date">
      <div class="form-label">下次抄表</div>
      <div class="date-range">
        <input type="text" id="nextRead1" placeholder="115/5/7" inputmode="text" class="date-input">
        <input type="text" id="nextRead2" placeholder="115/6/1" inputmode="text" class="date-input">
      </div>
    </div>
    <div class="form-row">
      <div class="form-label">帳單總度數</div>
      <div class="input-pair">
        <input type="number" id="totalKwh" placeholder="552" inputmode="decimal">
        <span class="unit">度</span>
      </div>
    </div>
    <div class="info-row">以下資料來自台電帳單的「電費計算明細」</div>
    <div class="form-row-double">
      <div class="form-label">級距一<small>度數 / 單價</small></div>
      <div class="input-pair">
        <input type="number" id="tier1Kwh" placeholder="240" inputmode="decimal">
        <span class="unit">度</span>
      </div>
      <div class="input-pair">
        <input type="number" id="tier1Price" placeholder="1.78" inputmode="decimal" step="0.01">
        <span class="unit">元</span>
      </div>
    </div>
    <div class="form-row-double">
      <div class="form-label">級距二<small>度數 / 單價</small></div>
      <div class="input-pair">
        <input type="number" id="tier2Kwh" placeholder="312" inputmode="decimal">
        <span class="unit">度</span>
      </div>
      <div class="input-pair">
        <input type="number" id="tier2Price" placeholder="2.26" inputmode="decimal" step="0.01">
        <span class="unit">元</span>
      </div>
    </div>
    <div class="form-row-double">
      <div class="form-label">級距三<small>選填，沒有留空</small></div>
      <div class="input-pair">
        <input type="number" id="tier3Kwh" placeholder="—" inputmode="decimal">
        <span class="unit">度</span>
      </div>
      <div class="input-pair">
        <input type="number" id="tier3Price" placeholder="—" inputmode="decimal" step="0.01">
        <span class="unit">元</span>
      </div>
    </div>
  </div>

  <!-- 5樓電表 -->
  <div class="card">
    <div class="card-title">5樓分表讀數</div>
    <div class="form-row">
      <div class="form-label">當期讀數</div>
      <div class="input-pair">
        <input type="number" id="meterCurr" placeholder="7628" inputmode="numeric">
        <span class="unit">度</span>
      </div>
    </div>
    <div class="form-row" id="prev-row">
      <div class="form-label">前期讀數<small id="prev-hint" style="color:var(--success)"></small></div>
      <div class="input-pair">
        <input type="number" id="meterPrev" placeholder="7433" inputmode="numeric">
        <span class="unit">度</span>
      </div>
    </div>
  </div>

  <button class="btn-calc" onclick="calculate()">計算電費</button>

  <!-- 結果 -->
  <div class="result-section" id="result-section">
    <div class="card">
      <div class="card-title">計算結果</div>
      <div class="result-row">
        <div class="result-label">4樓電費<small id="r-f4-detail"></small></div>
        <div class="result-value f4" id="r-f4">—</div>
      </div>
      <div class="result-row">
        <div class="result-label">5樓電費<small id="r-f5-detail"></small></div>
        <div class="result-value f5" id="r-f5">—</div>
      </div>
      <div class="result-row" style="border-top: 2px solid var(--border); margin-top: 2px;">
        <div class="result-label" style="font-weight:600">總電費</div>
        <div class="result-value total" id="r-total">—</div>
      </div>
    </div>

    <!-- 用電明細 -->
    <div class="card">
      <div class="card-title">用電度數明細</div>
      <div class="result-row">
        <div class="result-label">4樓用電</div>
        <div class="result-value" id="r-f4-kwh" style="font-size:15px; font-weight:500">—</div>
      </div>
      <div class="result-row">
        <div class="result-label">5樓用電</div>
        <div class="result-value" id="r-f5-kwh" style="font-size:15px; font-weight:500">—</div>
      </div>
      <div class="result-row">
        <div class="result-label">4樓比例</div>
        <div class="result-value" id="r-f4-pct" style="font-size:15px; font-weight:500; color:var(--text2)">—</div>
      </div>
      <div class="result-row">
        <div class="result-label">5樓比例</div>
        <div class="result-value" id="r-f5-pct" style="font-size:15px; font-weight:500; color:var(--text2)">—</div>
      </div>
    </div>

    <button class="btn-save" onclick="saveRecord()">儲存本期紀錄</button>
  </div>
</div>

<!-- Page: 紀錄 -->
<div class="page" id="page-history">
  <div class="card" id="history-card">
    <div class="card-title">歷史紀錄</div>
    <div id="history-list"></div>
  </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('calc')" id="tab-calc">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="4" width="16" height="16" rx="2"/>
      <line x1="4" y1="9" x2="20" y2="9"/>
      <line x1="9" y1="20" x2="9" y2="9"/>
    </svg>
    計算
  </button>
  <button class="tab-btn" onclick="switchTab('history')" id="tab-history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="8"/>
      <polyline points="12 8 12 12 14 14"/>
    </svg>
    紀錄
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────
let lastCalc = null;

// ─── Tab ─────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'history') renderHistory();
}

// ─── Calculate ───────────────────────────────────
function calculate() {
  const periodYear  = document.getElementById('periodYear').value;
  const periodMonth = document.getElementById('periodMonth').value;
  const period      = `${periodYear}年${periodMonth}月`;
  const billDateFrom = document.getElementById('billDateFrom').value.trim();
  const billDateTo   = document.getElementById('billDateTo').value.trim();
  const nextRead1    = document.getElementById('nextRead1').value.trim();
  const nextRead2    = document.getElementById('nextRead2').value.trim();
  const totalKwh  = parseFloat(document.getElementById('totalKwh').value);
  const tier1Kwh  = parseFloat(document.getElementById('tier1Kwh').value);
  const tier1P    = parseFloat(document.getElementById('tier1Price').value);
  const tier2Kwh  = parseFloat(document.getElementById('tier2Kwh').value);
  const tier2P    = parseFloat(document.getElementById('tier2Price').value);
  const tier3Kwh  = parseFloat(document.getElementById('tier3Kwh').value) || 0;
  const tier3P    = parseFloat(document.getElementById('tier3Price').value) || 0;
  const curr      = parseFloat(document.getElementById('meterCurr').value);
  const prev      = parseFloat(document.getElementById('meterPrev').value);

  if (!periodYear) { showToast('請選擇帳單年份'); return; }
  if (isNaN(totalKwh) || isNaN(tier1Kwh) || isNaN(tier1P) || isNaN(tier2Kwh) || isNaN(tier2P)) {
    showToast('請填寫完整帳單資訊'); return;
  }
  if (isNaN(curr) || isNaN(prev)) { showToast('請填寫5樓電表讀數'); return; }
  if (curr <= prev) { showToast('當期讀數需大於前期讀數'); return; }
  if (totalKwh <= 0) { showToast('帳單總度數有誤'); return; }

  const f5Kwh = curr - prev;
  const f4Kwh = totalKwh - f5Kwh;

  if (f4Kwh < 0) { showToast('5樓度數超過帳單總度數，請確認'); return; }

  const f4Ratio = f4Kwh / totalKwh;
  const f5Ratio = f5Kwh / totalKwh;

  // Split each tier by ratio
  const f4T1 = tier1Kwh * f4Ratio;
  const f4T2 = tier2Kwh * f4Ratio;
  const f4T3 = tier3Kwh * f4Ratio;
  const f5T1 = tier1Kwh * f5Ratio;
  const f5T2 = tier2Kwh * f5Ratio;
  const f5T3 = tier3Kwh * f5Ratio;

  const f4Cost = f4T1 * tier1P + f4T2 * tier2P + f4T3 * tier3P;
  const f5Cost = f5T1 * tier1P + f5T2 * tier2P + f5T3 * tier3P;
  const total  = f4Cost + f5Cost;

  // Display results
  document.getElementById('r-f4').textContent = '$' + Math.round(f4Cost);
  document.getElementById('r-f5').textContent = '$' + Math.round(f5Cost);
  document.getElementById('r-total').textContent = '$' + Math.round(total);
  const f4DetailParts = [`級距一 $${(f4T1*tier1P).toFixed(0)}`, `級距二 $${(f4T2*tier2P).toFixed(0)}`];
  const f5DetailParts = [`級距一 $${(f5T1*tier1P).toFixed(0)}`, `級距二 $${(f5T2*tier2P).toFixed(0)}`];
  if (tier3Kwh > 0) { f4DetailParts.push(`級距三 $${(f4T3*tier3P).toFixed(0)}`); f5DetailParts.push(`級距三 $${(f5T3*tier3P).toFixed(0)}`); }
  document.getElementById('r-f4-detail').textContent = f4DetailParts.join(' ＋ ');
  document.getElementById('r-f5-detail').textContent = f5DetailParts.join(' ＋ ');
  document.getElementById('r-f4-kwh').textContent = f4Kwh.toFixed(1) + ' 度';
  document.getElementById('r-f5-kwh').textContent = f5Kwh.toFixed(1) + ' 度';
  document.getElementById('r-f4-pct').textContent = (f4Ratio * 100).toFixed(1) + '%';
  document.getElementById('r-f5-pct').textContent = (f5Ratio * 100).toFixed(1) + '%';

  document.getElementById('result-section').classList.add('show');

  // Scroll to result
  setTimeout(() => {
    document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);

  // Store for saving
  lastCalc = { period, billDateFrom, billDateTo, nextRead1, nextRead2,
    totalKwh, tier1Kwh, tier1P, tier2Kwh, tier2P, tier3Kwh, tier3P, curr, prev,
    f4Kwh, f5Kwh, f4Cost: Math.round(f4Cost), f5Cost: Math.round(f5Cost),
    total: Math.round(total), f4Ratio, f5Ratio,
    f4T1, f4T2, f4T3, f5T1, f5T2, f5T3, tier1P, tier2P, tier3P,
    savedAt: new Date().toISOString() };
}

// ─── Save ────────────────────────────────────────
function saveRecord() {
  if (!lastCalc) return;
  const records = getRecords();
  // Check duplicate period
  if (records.find(r => r.period === lastCalc.period)) {
    if (!confirm(`「${lastCalc.period}」已有紀錄，要覆蓋嗎？`)) return;
    const idx = records.findIndex(r => r.period === lastCalc.period);
    records.splice(idx, 1);
  }
  records.unshift(lastCalc);
  saveRecords(records);

  // Auto-fill prev reading for next period
  localStorage.setItem('lastMeterReading', String(lastCalc.curr));
  showToast('✓ 紀錄已儲存');
}

// ─── History ─────────────────────────────────────
function renderHistory() {
  const records = getRecords();
  const container = document.getElementById('history-list');
  if (records.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">還沒有任何紀錄</div></div>';
    return;
  }
  container.innerHTML = records.map((r, i) => `
    <div class="history-item" onclick="toggleDetail(${i})">
      <div class="history-meta">
        <div class="history-period">${r.period}</div>
        <div class="history-total">$${r.total}</div>
      </div>
      <div class="history-fees">
        <div class="history-fee">4樓 <span>$${r.f4Cost}</span></div>
        <div class="history-fee">5樓 <span>$${r.f5Cost}</span></div>
        <div class="history-fee">帳單 <span>${r.totalKwh} 度</span></div>
      </div>
      <div class="history-detail" id="detail-${i}">
        ${r.billDateFrom ? `<div class="detail-row"><span style="color:var(--text2)">計費日期</span><span>${r.billDateFrom} 至 ${r.billDateTo}</span></div>` : ''}
        ${r.nextRead1 ? `<div class="detail-row"><span style="color:var(--text2)">下次抄表</span><span>${r.nextRead1}　${r.nextRead2}</span></div>` : ''}
        <div class="detail-row"><span style="color:var(--text2)">5樓電表</span><span>${r.prev} → ${r.curr}（${r.f5Kwh.toFixed(0)}度）</span></div>
        <div class="detail-row"><span style="color:var(--text2)">4樓用電</span><span>${r.f4Kwh.toFixed(1)} 度（${(r.f4Ratio*100).toFixed(1)}%）</span></div>
        <div class="detail-row"><span style="color:var(--text2)">5樓用電</span><span>${r.f5Kwh.toFixed(1)} 度（${(r.f5Ratio*100).toFixed(1)}%）</span></div>
        <div class="detail-row"><span style="color:var(--text2)">級距一</span><span>${r.tier1Kwh}度 × $${r.tier1P}</span></div>
        <div class="detail-row"><span style="color:var(--text2)">級距二</span><span>${r.tier2Kwh}度 × $${r.tier2P}</span></div>
        ${r.tier3Kwh > 0 ? `<div class="detail-row"><span style="color:var(--text2)">級距三</span><span>${r.tier3Kwh}度 × $${r.tier3P}</span></div>` : ''}
        <button class="btn-delete" onclick="deleteRecord(event,${i})">刪除此紀錄</button>
      </div>
    </div>
  `).join('');
}

function toggleDetail(i) {
  const el = document.getElementById('detail-' + i);
  el.classList.toggle('show');
}

function deleteRecord(e, i) {
  e.stopPropagation();
  if (!confirm('確定要刪除這筆紀錄嗎？')) return;
  const records = getRecords();
  records.splice(i, 1);
  saveRecords(records);
  renderHistory();
}

// ─── Storage ─────────────────────────────────────
function getRecords() {
  try { return JSON.parse(localStorage.getItem('elecRecords') || '[]'); }
  catch { return []; }
}
function saveRecords(records) {
  localStorage.setItem('elecRecords', JSON.stringify(records));
}

// ─── Toast ───────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Init ─────────────────────────────────────────
(function init() {
  // Populate year dropdown (ROC calendar: current year ± 3)
  const rocNow = new Date().getFullYear() - 1911;
  const yearSel = document.getElementById('periodYear');
  for (let y = rocNow + 20; y >= rocNow - 3; y--) {
    const opt = document.createElement('option');
    opt.value = String(y);
    opt.textContent = String(y);
    yearSel.appendChild(opt);
  }
  yearSel.value = String(rocNow);

  // Default month to current
  const m = String(new Date().getMonth() + 1).padStart(2, '0');
  document.getElementById('periodMonth').value = m;

  // Auto-fill prev meter reading from last saved record
  const last = localStorage.getItem('lastMeterReading');
  if (last) {
    document.getElementById('meterPrev').value = last;
    document.getElementById('prev-hint').textContent = '已自動填入上期讀數';
  }
})();
</script>
</body>
</html>
